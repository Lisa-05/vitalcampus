<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Vital Campus</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>🌿 Vital Campus</h1>
            <p>Create Your Account</p>
            
            <div style="font-size:12px; color:#0288D1; margin-bottom:15px;">
                Progress: ●━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ Step 1/3
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST">
                <div class="form-group">
                    <label>Student Number</label>
                    <input type="text" name="student_number" placeholder="2025123456" required>
                </div>
                <div class="form-group">
                    <label>Preferred Name</label>
                    <input type="text" name="preferred_name" placeholder="Thimna" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="thimna@university.ac.za" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Create a password" required>
                </div>
                <div class="form-group">
                    <label>Faculty</label>
                    <select name="faculty" required>
                        <option value="">Select Faculty</option>
                        <option value="ICT">ICT</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Commerce">Commerce</option>
                        <option value="Education">Education</option>
                        <option value="Health Sciences">Health Sciences</option>
                        <option value="Humanities">Humanities</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Year of Study</label>
                    <select name="year_of_study" required>
                        <option value="">Select Year</option>
                        <option value="1">1st Year</option>
                        <option value="2">2nd Year</option>
                        <option value="3">3rd Year</option>
                        <option value="4">4th Year</option>
                    </select>
                </div>
                <button type="submit" class="btn-login">Continue →</button>
            </form>
            
            <div style="text-align:center; margin-top:15px;">
                <a href="{{ url_for('login') }}" style="color:#0288D1; text-decoration:none;">
                    Already have an account? Login
                </a>
            </div>
        </div>
    </div>
</body>
</html>
